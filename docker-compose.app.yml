services:
  production-card:
    image: ghcr.io/ukstevem/pss-production-card:${IMAGE_TAG:-latest}
    container_name: production-card
    restart: unless-stopped
    # Portainer Stack > Environment variables (or shell `export` for
    # local docker compose). Required at runtime:
    #   NEXT_PUBLIC_SUPABASE_URL
    #   NEXT_PUBLIC_SUPABASE_ANON_KEY
    #   NEXT_PUBLIC_APP_URL
    #   NEXT_PUBLIC_DOC_SERVICE_URL
    #   SUPABASE_URL
    #   SUPABASE_SECRET_KEY
    #   DOC_SERVICE_API_KEY
    #   KIOSK_HMAC_SECRET
    # The NEXT_PUBLIC_* values are also baked into the client bundle at
    # build time (from platform-portal/.env when ./build.sh ran); passing
    # them again at runtime is harmless and lets server-side code that
    # imports @platform/supabase work too.
    environment:
      PORT: 3014
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_DOC_SERVICE_URL: ${NEXT_PUBLIC_DOC_SERVICE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      DOC_SERVICE_API_KEY: ${DOC_SERVICE_API_KEY}
      KIOSK_HMAC_SECRET: ${KIOSK_HMAC_SECRET}
    ports:
      - "3014:3014"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3014/production-card/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  default:
    name: platform_net
    external: true
